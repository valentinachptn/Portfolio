<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Jana Web | Valentina Chapoton</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-detail-page">

    <nav class="main-nav">
        <a href="projets.html" class="back-link">← Retour aux projets</a>
    </nav>

    <!-- HEADER DU PROJET -->
    <header class="project-header">
        <h1 class="font-title">Jana Web</h1>
        <p class="project-subtitle">Refonte Identité Visuelle & Branding</p>
    </header>

    <!-- LA BENTO GRID (Comme sur tes images de référence) -->
    <section class="bento-grid">
        
        <!-- Bloc 1 : Gros logo ou Visuel principal (Prend 2 cases de large) -->
        <div class="bento-item bento-large bg-pink">
            <img src="assets/jana-logo-grand.svg" alt="Logo Jana Web">
        </div>

        <!-- Bloc 2 : Les couleurs de la palette -->
        <div class="bento-item bento-tall bg-dark text-white">
            <h3>Palette</h3>
            <div class="color-swatches">
                <div class="swatch" style="background-color: #ff99cc;"></div>
                <div class="swatch" style="background-color: #66ccff;"></div>
                <div class="swatch" style="background-color: #ffcc00;"></div>
            </div>
        </div>

        <!-- Bloc 3 : Typographie ou petit texte -->
        <div class="bento-item bg-blue">
            <h3 class="font-title">Typographie</h3>
            <p class="large-type">Tan Pearl</p>
            <p>Roboto Regular</p>
        </div>

        <!-- Bloc 4 : Mockup Ordinateur (Prend toute la largeur en bas) -->
        <div class="bento-item bento-full bg-light">
            <img src="assets/jana-mockup-mac.jpg" alt="Mockup Site Web">
        </div>

    </section>

</body>
</html>
