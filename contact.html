<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Valentina Chapoton</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

    <!-- Navigation pour revenir en arrière -->
    <nav class="main-nav">
        <a href="index.html" class="back-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Retour à l'accueil
        </a>
    </nav>

    <!-- Section Contact (Structure similaire à ton About pour la cohérence) -->
    <section id="contact-section">
        <div class="contact-container">
            
            <!-- La colonne de gauche (Texte & Liens) -->
            <div class="contact-content">
                <h1 class="font-title contact-title">Contactez-moi</h1>
                <p class="contact-desc">
                    Vous avez un projet, une offre d'alternance ou simplement envie d'échanger sur le design ? N'hésitez pas à m'écrire, je serais ravie d'en discuter avec vous !
                </p>
                
                <div class="contact-links-group">
                    <!-- Lien Email -->
                    <div class="contact-item">
                        <span class="contact-label">Email</span>
                        <a href="mailto:valentinachapoton@gmail.com" class="contact-link-large">valentinachapoton@gmail.com</a>
                    </div>

                    <!-- Lien Téléphone -->
                    <div class="contact-item">
                        <span class="contact-label">Téléphone</span>
                        <a href="tel:+33783560973" class="contact-link-large">+33 7 83 56 09 73</a>
                    </div>
                </div>

                <!-- Petits boutons réseaux sociaux optionnels (tu peux les enlever si besoin) -->
                <div class="social-links-small">
                    <a href="https://www.linkedin.com/in/valentina-chapoton/" target="_blank">LinkedIn</a>
                    <a href="https://www.behance.net/valentichapoto" target="_blank">Behance</a>
                </div>
            </div>

            <!-- La colonne de droite (Photo) -->
            <div class="contact-image-wrapper">
                <!-- Tu pourras mettre une belle photo de toi ici -->
                <img src="assets/valentina-photo-contact.png" alt="Photo de Valentina" class="contact-photo">
            </div>

        </div>
    </section>

</body>
</html>
