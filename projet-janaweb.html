<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Jana Web | Valentina Chapoton</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-detail-page">

    <!-- NAVIGATION -->
    <nav class="main-nav">
        <a href="projets.html" class="back-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Retour aux projets
        </a>
    </nav>

    <!-- HEADER DU PROJET -->
    <header class="project-header">
        <h1 class="font-title">Jana Web</h1>
        <p class="project-subtitle">Refonte Identité Visuelle & Branding</p>
    </header>

    <!-- BENTO GRID -->
    <section class="bento-grid">
        
        <!-- Bloc 1 : Image principale en haut à gauche -->
        <div class="bento-item bento-large bg-pink">
            <img class="bento-img" src="assets/mockup-logo-janaweb-1.jpg" alt="Mockup logo Jana Web principal">
        </div>

        <!-- Bloc 2 : Bloc noir à côté -->
        <div class="bento-item bento-tall bg-dark text-white">
            <img class="bento-img" src="assets/mockup-logo-janaweb-long.jpg" alt="Version horizontale du logo Jana Web">
        </div>

        <!-- Bloc 3 : Typographie -->
        <div class="bento-item bg-blue">
            <h3 class="gilroy-bold" style="font-size: 1.5rem; margin-bottom: 1rem;">Typographie</h3>
            <p class="large-type gilroy-bold" style="font-size: 2.5rem;">Gilroy Bold</p>
        </div>

        <!-- Bloc 4 : Texte à droite de Typographie -->
        <!-- La classe project-text (que tu ajouteras au CSS) permet d'aligner le texte à gauche -->
        <div class="bento-item bg-light project-text" style="align-items: flex-start; justify-content: center; text-align: left;">
            <h3 class="font-title" style="margin-bottom: 1rem; color: var(--primary-blue); font-size: 2rem;">Projet</h3>
            <p style="margin-bottom: 2rem; color: var(--text-gray); line-height: 1.6;">
                Projet réalisé lors de mon alternance chez Jana Web, visant à refondre leur identité visuelle.
            </p>
            
            <!-- Le lien transformé en bouton qui réutilise la classe btn-primary du CSS de la home -->
            <a href="https://www.jana-agenceweb.com" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                Voir le site
            </a>
        </div>

        <!-- Bloc 5 : Image du bas -->
        <div class="bento-item bento-full bg-light">
            <img class="bento-img" src="assets/mockup-janaweb-sweat.png" alt="Mockup textile Jana Web">
        </div>

    </section>

</body>
</html>
