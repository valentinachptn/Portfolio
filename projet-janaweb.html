<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Jana Web | Valentina Chapoton</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-detail-page">

    <nav class="main-nav">
        <a href="projets.html" class="back-link">← Retour aux projets</a>
    </nav>

    <!-- HEADER DU PROJET -->
    <header class="project-header">
        <h1 class="font-title">Jana Web</h1>
        <p class="project-subtitle">Refonte Identité Visuelle & Branding</p>
    </header>

    <!-- BENTO GRID -->
    <section class="bento-grid">
        
        <!-- Bloc 1 : Image principale en haut à gauche -->
        <div class="bento-item bento-large bg-pink">
            <img src="assets/mockup-logo-janaweb-1.jpg" alt="Mockup logo Jana Web principal">
        </div>

        <!-- Bloc 2 : Bloc noir à côté -->
        <div class="bento-item bento-tall bg-dark text-white">
            <img src="assets/mockup-logo-janaweb-long.jpg" alt="Version horizontale du logo Jana Web">
        </div>

        <!-- Bloc 3 : Typographie -->
        <div class="bento-item bg-blue">
            <h3 class="font-title">Typographie</h3>
            <p class="large-type gilroy-bold">Gilroy Bold</p>
        </div>

        <!-- Bloc 4 : Texte à droite de Typographie -->
        <div class="bento-item bg-light project-text">
            <p>
                Projet réalisé lors de mon alternance chez Jana Web, visant à refondre leur identité visuelle.
                <a href="https://www.jana-agenceweb.com" target="_blank" rel="noopener noreferrer">
                    jana-agenceweb.com
                </a>
            </p>
        </div>

        <!-- Bloc 5 : Image du bas -->
        <div class="bento-item bento-full bg-light">
            <img src="assets/mockup-janaweb-sweat.png" alt="Mockup textile Jana Web">
        </div>

    </section>

</body>
</html>
